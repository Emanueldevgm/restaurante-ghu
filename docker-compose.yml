version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: restaurante_ghu_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: restaurante_angola_db
      MYSQL_USER: restaurante_user
      MYSQL_PASSWORD: restaurante_password
      TZ: 'Africa/Luanda'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./api/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - restaurante_network

  # PHPMyAdmin (Opcional - para gerenciar banco via UI)
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: restaurante_ghu_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - restaurante_network

volumes:
  mysql_data:
    driver: local

networks:
  restaurante_network:
    driver: bridge
