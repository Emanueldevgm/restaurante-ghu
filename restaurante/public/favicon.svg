<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7d2d4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a1f35;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6a84b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4941f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield background -->
  <path d="M32 6 L50 14 L50 32 C50 45 40 57 32 59 C24 57 14 45 14 32 L14 14 L32 6 Z" 
    fill="url(#shieldGradient)" stroke="#f0e5d9" stroke-width="1.5" stroke-linejoin="round"/>
  
  <!-- Circle accent -->
  <circle cx="32" cy="30" r="15" fill="none" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Fork (left side) -->
  <g fill="none" stroke="#f0e5d9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Fork handle -->
    <line x1="22" y1="45" x2="22" y2="20"/>
    <!-- Fork prongs -->
    <line x1="18" y1="20" x2="18" y2="32"/>
    <line x1="22" y1="18" x2="22" y2="30"/>
    <line x1="26" y1="20" x2="26" y2="32"/>
    <!-- Fork top connector -->
    <path d="M 18 18 Q 22 16 26 18" fill="none"/>
  </g>
  
  <!-- Knife (right side) -->
  <g fill="none" stroke="#f0e5d9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Knife blade -->
    <path d="M 42 18 L 39 45 Q 42 48 45 45 L 42 18" fill="#f0e5d9" opacity="0.9"/>
    <!-- Blade edge highlight -->
    <line x1="41" y1="20" x2="41" y2="42" stroke="#e6a84b" stroke-width="1" opacity="0.8"/>
  </g>
  
  <!-- Center accent star -->
  <circle cx="32" cy="30" r="2" fill="#e6a84b"/>
</svg>
